<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nick Checker</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{--bg:#0a0a0f;--card:#1a1a26;--border:#2a2a3d;--accent:#7c6bff;--accent2:#ff6b9d;--green:#4ade80;--yellow:#facc15;--red:#f87171;--text:#e8e8f0;--muted:#6b6b8a;--glow:rgba(124,107,255,0.25);}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;overflow-x:hidden;padding-bottom:40px;}
  body::before{content:'';position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(124,107,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(124,107,255,.04) 1px,transparent 1px);background-size:32px 32px;pointer-events:none;}
  .wrap{position:relative;z-index:1;max-width:420px;margin:0 auto;padding:0 16px;}
  header{padding:28px 0 20px;display:flex;align-items:center;gap:12px;}
  .logo-box{width:44px;height:44px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:12px;display:grid;place-items:center;font-size:22px;box-shadow:0 0 20px var(--glow);}
  header h1{font-size:22px;font-weight:800;letter-spacing:-.5px;}
  header span{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);display:block;margin-top:2px;}

  .conn-badge{display:flex;align-items:center;gap:7px;background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:8px 14px;margin-bottom:20px;font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);}
  .conn-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);flex-shrink:0;}
  .conn-dot.ok{background:var(--green);box-shadow:0 0 6px var(--green);}
  .conn-dot.err{background:var(--red);box-shadow:0 0 6px var(--red);}
  .conn-dot.loading{background:var(--accent);animation:pulse 1s infinite;}
  .conn-badge b{color:var(--text);}

  .section-label{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
  .length-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px;}
  .len-btn{background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:14px 0;cursor:pointer;transition:all .2s;text-align:center;font-family:'Space Mono',monospace;}
  .len-btn .num{font-size:22px;font-weight:700;color:var(--text);display:block;}
  .len-btn .lbl{font-size:10px;color:var(--muted);display:block;margin-top:2px;letter-spacing:1px;text-transform:uppercase;}
  .len-btn.active{border-color:var(--accent);background:rgba(124,107,255,.15);box-shadow:0 0 18px var(--glow);}
  .len-btn.active .num{color:var(--accent);}

  .actions{display:flex;gap:8px;margin-bottom:20px;}
  .btn{flex:1;padding:14px;border-radius:12px;border:none;cursor:pointer;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px;}
  .btn-primary{background:linear-gradient(135deg,var(--accent),#5b4fe8);color:#fff;box-shadow:0 4px 20px var(--glow);}
  .btn-primary:hover{transform:translateY(-1px);}
  .btn-primary:disabled{opacity:.45;cursor:not-allowed;transform:none;}
  .btn-stop{background:var(--card);border:1.5px solid var(--border);color:var(--red);}
  .btn-stop:hover{border-color:var(--red);background:rgba(248,113,113,.1);}
  .btn-stop:disabled{opacity:.35;cursor:not-allowed;}
  .btn-one{background:var(--card);border:1.5px solid var(--border);color:var(--text);flex:0 0 auto;padding:14px 18px;}
  .btn-one:hover{border-color:var(--accent);color:var(--accent);}
  .btn-one:disabled{opacity:.35;cursor:not-allowed;}

  .status-bar{background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:12px 16px;display:flex;align-items:center;gap:10px;margin-bottom:20px;font-family:'Space Mono',monospace;font-size:12px;}
  .status-dot{width:8px;height:8px;border-radius:50%;background:var(--muted);flex-shrink:0;}
  .status-dot.running{background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 1.5s infinite;}
  .status-dot.scanning{background:var(--accent);box-shadow:0 0 8px var(--accent);animation:pulse 1s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .status-text{color:var(--muted);flex:1;}
  .status-text b{color:var(--text);}

  .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px;}
  .stat-card{background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:12px 6px;text-align:center;}
  .stat-card .val{font-family:'Space Mono',monospace;font-size:20px;font-weight:700;color:var(--accent);display:block;}
  .stat-card .val.green{color:var(--green);}
  .stat-card .val.yellow{color:var(--yellow);}
  .stat-card .key{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;display:block;margin-top:4px;}

  .results-label{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .clear-btn{background:none;border:none;color:var(--muted);font-size:11px;font-family:'Space Mono',monospace;cursor:pointer;letter-spacing:1px;transition:color .2s;}
  .clear-btn:hover{color:var(--red);}

  .feed{display:flex;flex-direction:column;gap:8px;}

  /* Карточка свободного ника */
  .nick-card{background:var(--card);border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px;animation:slideIn .3s ease;}
  .nick-card.free{border:1.5px solid var(--green);box-shadow:0 0 16px rgba(74,222,128,.1);}
  .nick-card.sale{border:1.5px solid var(--yellow);box-shadow:0 0 16px rgba(250,204,21,.1);}
  @keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
  .nick-icon{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;font-size:18px;flex-shrink:0;}
  .nick-card.free .nick-icon{background:rgba(74,222,128,.15);}
  .nick-card.sale .nick-icon{background:rgba(250,204,21,.15);}
  .nick-info{flex:1;min-width:0;}
  .nick-name{font-family:'Space Mono',monospace;font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .nick-card.free .nick-name{color:var(--green);}
  .nick-card.sale .nick-name{color:var(--yellow);}
  .nick-meta{font-size:11px;color:var(--muted);margin-top:3px;display:flex;gap:8px;flex-wrap:wrap;}
  .badge{font-size:10px;padding:2px 7px;border-radius:999px;font-family:'Space Mono',monospace;font-weight:700;}
  .badge-free{background:rgba(74,222,128,.15);color:var(--green);border:1px solid var(--green);}
  .badge-sale{background:rgba(250,204,21,.15);color:var(--yellow);border:1px solid var(--yellow);}
  .nick-time{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);flex-shrink:0;}
  .copy-btn{background:rgba(124,107,255,.15);border:1px solid var(--accent);color:var(--accent);border-radius:8px;padding:6px 10px;font-size:12px;cursor:pointer;font-family:'Space Mono',monospace;transition:all .15s;flex-shrink:0;}
  .copy-btn:hover{background:var(--accent);color:#fff;}
  .copy-btn.copied{background:var(--green);border-color:var(--green);color:#000;}

  .empty-state{text-align:center;padding:40px 20px;color:var(--muted);font-family:'Space Mono',monospace;font-size:12px;border:1.5px dashed var(--border);border-radius:12px;}
  .empty-state div{font-size:32px;margin-bottom:12px;}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--accent);color:#fff;padding:10px 20px;border-radius:999px;font-size:13px;font-weight:700;z-index:999;transition:transform .3s ease;white-space:nowrap;}
  .toast.show{transform:translateX(-50%) translateY(0);}
  .divider{height:1px;background:var(--border);margin:4px 0 20px;}

  /* Легенда */
  .legend{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;}
  .legend-item{display:flex;align-items:center;gap:5px;font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);}
  .legend-dot{width:8px;height:8px;border-radius:50%;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo-box">🔎</div>
    <div>
      <h1>Nick Checker</h1>
      <span>TELEGRAM USERNAME FINDER</span>
    </div>
  </header>

  <div class="conn-badge">
    <div class="conn-dot loading" id="connDot"></div>
    <span id="connText">Подключение к серверу...</span>
  </div>

  <div class="section-label">Длина ника</div>
  <div class="length-row">
    <button class="len-btn active" data-len="5" onclick="setLen(5)">
      <span class="num">5</span><span class="lbl">букв</span>
    </button>
    <button class="len-btn" data-len="6" onclick="setLen(6)">
      <span class="num">6</span><span class="lbl">букв</span>
    </button>
    <button class="len-btn" data-len="7" onclick="setLen(7)">
      <span class="num">7</span><span class="lbl">букв</span>
    </button>
  </div>

  <div class="actions">
    <button class="btn btn-primary" id="btnStart" onclick="startSearch()">▶ Запустить</button>
    <button class="btn btn-stop"    id="btnStop"  onclick="stopSearch()" disabled>⏹ Стоп</button>
    <button class="btn btn-one"     id="btnOne"   onclick="findOne()">🔍</button>
  </div>

  <div class="status-bar">
    <div class="status-dot" id="dot"></div>
    <div class="status-text" id="statusText">Готов к поиску</div>
  </div>

  <div class="stats-row">
    <div class="stat-card"><span class="val" id="statChecked">0</span><span class="key">Проверено</span></div>
    <div class="stat-card"><span class="val green" id="statFree">0</span><span class="key">Свободных</span></div>
    <div class="stat-card"><span class="val yellow" id="statSale">0</span><span class="key">На продаже</span></div>
    <div class="stat-card"><span class="val" id="statTime">0с</span><span class="key">Время</span></div>
  </div>

  <div class="divider"></div>

  <div class="results-label">
    <div class="section-label" style="margin:0">Результаты</div>
    <button class="clear-btn" onclick="clearFeed()">очистить</button>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div> Свободен в Telegram</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--yellow)"></div> Продаётся на Fragment</div>
  </div>

  <div class="feed" id="feed">
    <div class="empty-state"><div>🕵️</div>Результаты появятся здесь</div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

// !! Вставь свой Render URL
const BACKEND = "https://usernamechecker-1.onrender.com";

let selectedLen  = 5;
let isRunning    = false;
let isFindingOne = false;
let sessionTimer = null;
let sessionSecs  = 0;
let checked = 0, foundFree = 0, foundSale = 0;

// ── Ping при загрузке ──
async function pingBackend() {
  const dot  = document.getElementById('connDot');
  const text = document.getElementById('connText');
  try {
    const r = await fetch(BACKEND + '/health', { signal: AbortSignal.timeout(8000) });
    const j = await r.json();
    if (j.status === 'ok') {
      dot.className  = 'conn-dot ok';
      text.innerHTML = '<b>Сервер подключён</b> · Telegram API активен';
    } else throw new Error();
  } catch {
    dot.className  = 'conn-dot err';
    text.innerHTML = '<b>Сервер недоступен</b> · проверь Render';
  }
}
pingBackend();

// ── Генератор ──
const VOWELS     = [...'aeiou'];
const CONSONANTS = [...'bcdfghjklmnprstvwxyz'];
const SOFT_PAIRS = ['ar','er','or','an','en','on','al','el','ol','ra','re','ro','na','ne','no','la','le','lo','ma','me','mo','sa','se','so','ta','te','to','va','ve','vo','ka','ke','ko','da','de','do','ba','be','bo','fa','fe','fo','ga','ge','go'];

function syllable() {
  const c=CONSONANTS[Math.floor(Math.random()*CONSONANTS.length)];
  const v=VOWELS[Math.floor(Math.random()*VOWELS.length)];
  return Math.random()<.5?c+v:c+v+CONSONANTS[Math.floor(Math.random()*CONSONANTS.length)];
}
function generateNick(len) {
  for(let i=0;i<100;i++){
    let n='';
    while(n.length<len){
      if(Math.random()<.4&&n.length+2<=len) n+=SOFT_PAIRS[Math.floor(Math.random()*SOFT_PAIRS.length)];
      else{const s=syllable();if(n.length+s.length<=len)n+=s;else if(len-n.length===1)n+=VOWELS[Math.floor(Math.random()*VOWELS.length)];else break;}
    }
    if(n.length===len) return n;
  }
  let n='';
  for(let i=0;i<len;i++) n+=i%2===0?CONSONANTS[Math.floor(Math.random()*CONSONANTS.length)]:VOWELS[Math.floor(Math.random()*VOWELS.length)];
  return n;
}

// ── Запрос к бэкенду ──
// Возвращает {nick, free, on_sale, price} или null при ошибке
async function checkNick(nick) {
  try {
    const r = await fetch(`${BACKEND}/check?nick=${encodeURIComponent(nick)}`, {
      signal: AbortSignal.timeout(15000)
    });
    return await r.json();
  } catch {
    return null;
  }
}

// ── UI ──
function setLen(n) {
  selectedLen=n;
  document.querySelectorAll('.len-btn').forEach(b=>b.classList.toggle('active',+b.dataset.len===n));
}
function setStatus(text,mode='') {
  document.getElementById('statusText').innerHTML=text;
  document.getElementById('dot').className='status-dot'+(mode?' '+mode:'');
}
function updateStats() {
  document.getElementById('statChecked').textContent=checked;
  document.getElementById('statFree').textContent=foundFree;
  document.getElementById('statSale').textContent=foundSale;
  const m=Math.floor(sessionSecs/60),s=sessionSecs%60;
  document.getElementById('statTime').textContent=m>0?`${m}м ${s}с`:`${s}с`;
}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

function addNickCard(result) {
  const {nick, free, on_sale, price} = result;
  const isSale = on_sale === true;
  const feed=document.getElementById('feed');
  const empty=feed.querySelector('.empty-state');
  if(empty) empty.remove();

  const time=new Date().toTimeString().slice(0,8);
  const card=document.createElement('div');
  card.className=`nick-card ${isSale?'sale':'free'}`;

  const icon  = isSale ? '💰' : '✨';
  const badge = isSale
    ? `<span class="badge badge-sale">Fragment · ${price||'?'}</span>`
    : `<span class="badge badge-free">Свободен</span>`;
  const link  = isSale
    ? `<a href="https://fragment.com/username/${nick}" target="_blank" style="color:var(--yellow);font-size:11px;">fragment.com/username/${nick}</a>`
    : `<span style="font-size:11px;color:var(--muted)">t.me/${nick}</span>`;

  card.innerHTML=`
    <div class="nick-icon">${icon}</div>
    <div class="nick-info">
      <div class="nick-name">@${nick}</div>
      <div class="nick-meta">${badge}${link}</div>
    </div>
    <span class="nick-time">${time}</span>
    <button class="copy-btn" onclick="copyNick('${nick}',this)">copy</button>`;
  feed.insertBefore(card,feed.firstChild);
}

function copyNick(nick,btn){
  navigator.clipboard.writeText(`@${nick}`).then(()=>{
    btn.textContent='✓';btn.classList.add('copied');
    showToast(`@${nick} скопирован!`);
    setTimeout(()=>{btn.textContent='copy';btn.classList.remove('copied');},1500);
  });
}
function clearFeed(){
  document.getElementById('feed').innerHTML='<div class="empty-state"><div>🕵️</div>Результаты появятся здесь</div>';
}
function setBusy(busy){
  document.getElementById('btnStart').disabled=busy;
  document.getElementById('btnStop').disabled=!busy;
  document.getElementById('btnOne').disabled=busy;
  document.querySelectorAll('.len-btn').forEach(b=>b.style.pointerEvents=busy?'none':'');
}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

// ── Поиск (показывает и свободные и те что на продаже) ──
async function startSearch(){
  if(isRunning) return;
  isRunning=true; checked=0; foundFree=0; foundSale=0; sessionSecs=0;
  setBusy(true); updateStats();
  sessionTimer=setInterval(()=>{sessionSecs++;updateStats();},1000);
  setStatus(`<b>Поиск запущен</b> · ${selectedLen} букв`,'running');

  while(isRunning){
    const nick=generateNick(selectedLen);
    setStatus(`Проверяю <b>@${nick}</b>...`,'scanning');
    const res=await checkNick(nick);
    if(!res||res.free===null){await sleep(1000);continue;}
    checked++;

    if(res.free){
      // Свободен в Telegram
      foundFree++;
      addNickCard(res);
      if(tg) tg.HapticFeedback.notificationOccurred('success');
    } else if(res.on_sale){
      // Занят, но продаётся на Fragment
      foundSale++;
      addNickCard(res);
      if(tg) tg.HapticFeedback.notificationOccurred('warning');
    }

    updateStats();
    const statusIcon = res.free ? '🟢' : res.on_sale ? '🟡' : '🔴';
    setStatus(`Последний: <b>@${nick}</b> ${statusIcon}`,'running');
    await sleep(3000);
  }
}

function stopSearch(){
  isRunning=false;
  clearInterval(sessionTimer);
  setBusy(false);
  setStatus('Поиск остановлен');
  document.getElementById('dot').className='status-dot';
}

// ── Найти один свободный ──
async function findOne(){
  if(isRunning||isFindingOne) return;
  isFindingOne=true;
  document.getElementById('btnOne').disabled=true;
  document.getElementById('btnStart').disabled=true;
  let attempts=0;

  while(true){
    const nick=generateNick(selectedLen);
    attempts++;
    setStatus(`🔍 Попытка <b>${attempts}</b> · @${nick}`,'scanning');
    const res=await checkNick(nick);
    if(!res||res.free===null){await sleep(500);continue;}
    checked++;updateStats();

    if(res.free||res.on_sale){
      if(res.free) foundFree++; else foundSale++;
      updateStats();
      addNickCard(res);
      if(tg) tg.HapticFeedback.notificationOccurred('success');
      const label = res.free ? 'Свободен' : `На продаже · ${res.price||'?'}`;
      setStatus(`✅ Найдено за <b>${attempts}</b> попыток! · ${label}`);
      document.getElementById('dot').className='status-dot';
      showToast(`@${nick} — ${res.free?'свободен':'на продаже'}!`);
      break;
    }
    await sleep(800);
  }
  isFindingOne=false;
  document.getElementById('btnOne').disabled=false;
  document.getElementById('btnStart').disabled=false;
}
</script>
</body>
</html>
